name: quizy-python-service

python-service: &python-service
  image: quizy-python-service:${IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: docker/Dockerfile
  env_file:
    - .env
  environment:
    PYTHONUNBUFFERED: "1"
    PYTHONPATH: /app
  volumes:
    - python_files_materials:/app/files_materials
  restart: unless-stopped
  stop_grace_period: 5m
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:
  worker:
    <<: *python-service
    command: ["python", "main.py"]

  api:
    <<: *python-service
    profiles:
      - api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3000"]
    ports:
      - "127.0.0.1:${PYTHON_API_PORT:-3123}:3000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  python_files_materials: